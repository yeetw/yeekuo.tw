---
# 空 front matter，強制 Jekyll 處理 Liquid
---
<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ site.data.links.title }}</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    :root {
      --bg-page: #7d8870;
      --bg-container: #a4b09a;
      --card-bg: #ffffff;
      --text-on-green: #ffffff;
      --text-on-card: #5b5b5b;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: var(--bg-page);
      color: var(--text-on-card); /* also doubles as global default text */
      font-family: -apple-system, BlinkMacSystemFont,
                   "Noto Sans TC", "PingFang TC", "Microsoft JhengHei",
                   sans-serif;
    }

    .container {
      max-width: 600px;
      margin: 32px auto;
      padding: 64px 32px;
      background: var(--bg-container);
      border-radius: 24px;
      text-align: center;
    }

    .logo {
      display: block;
      width: 120px;
      height: 120px;
      margin: 0 auto 16px;
      border-radius: 50%;
      object-fit: cover;
    }

    .title {
      margin: 0 0 16px;
      color: var(--text-on-green);
      font-size: 22px;
      font-weight: 500;
    }

    .profile-icons {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
    }

    .profile-icons a {
      color: var(--text-on-green);
      font-size: 22px;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .profile-icons a:hover {
      opacity: 0.7;
    }

    @media (max-width: 600px) {
      .container {
        margin: 0;
        border-radius: 0;
        min-height: 100vh;
        padding: 48px 16px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <img class="logo"
         src="{{ site.data.links.logo }}"
         alt="{{ site.data.links.title }}"
         width="120"
         height="120">
    <h1 class="title">{{ site.data.links.title }}</h1>

    <nav class="profile-icons" aria-label="Profile links">
      {% for item in site.data.links.profile_icons %}
        <a href="{{ item.url }}" target="_blank" rel="noopener">
          <i class="{{ item.icon }}" aria-hidden="true"></i>
        </a>
      {% endfor %}
    </nav>
  </main>
</body>
</html>
