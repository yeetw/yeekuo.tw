<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>我的旅遊文章</title>
  <style>
    :root{
      --text:#5b5b5b;
      --muted:#9a9a9a;
      --accent:#d7a0a0;
      --bg:#ffffff;
      --container:1100px;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      color:var(--text);
      background:var(--bg);
    }

    /* Top bar */
    header{
      position:sticky;
      top:0;
      background:#fff;
      border-bottom:1px solid #eee;
      z-index:10;
    }
    .top{
      max-width:var(--container);
      margin:0 auto;
      padding:18px 18px 10px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }
    .logo{
      width:34px;height:34px;border-radius:50%;
      background:#c9b7a8;
      display:grid;place-items:center;
      color:#fff;font-weight:700;
      letter-spacing:1px;
    }
    nav{
      max-width:var(--container);
      margin:0 auto;
      padding:12px 18px 16px;
      display:flex;
      justify-content:center;
      gap:26px;
      flex-wrap:wrap;
      font-size:14px;
      letter-spacing:.5px;
    }
    nav a{
      text-decoration:none;
      color:var(--muted);
    }
    nav a:hover{color:var(--text);}
    nav a.active{color:var(--accent);}

    /* Main */
    .wrap{
      max-width:var(--container);
      margin:0 auto;
      padding:36px 18px 60px;
    }

    /* Hero split image */
    .hero{
      position:relative;
      border:0;
      overflow:hidden;
      display:grid;
      grid-template-columns: 1fr 1fr;
      min-height:420px;
      background:#f6f6f6;
    }
    .hero img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .hero .overlay{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      padding:22px;
      pointer-events:none;
    }
    .overlay h1{
      margin:0;
      font-family: "Noto Serif TC","Songti TC","PMingLiU",serif;
      font-weight:600;
      font-size:44px;
      color:#fff;
      text-shadow:0 2px 18px rgba(0,0,0,.35);
      letter-spacing:2px;
      line-height:1.1;
    }
    /* 左側直排文字（可選） */
    .overlay .vertical{
      writing-mode:vertical-rl;
      text-orientation:mixed;
      font-size:30px;
      margin-right:12px;
      opacity:.95;
    }

    .post-title{
      margin:20px 0 0;
      font-family: "Noto Serif TC","Songti TC",serif;
      font-size:26px;
      color:#b98484;
      line-height:1.4;
    }

    /* Responsive */
    @media (max-width: 860px){
      .hero{grid-template-columns: 1fr; min-height:520px;}
      .overlay h1{font-size:34px;}
      .overlay .vertical{font-size:24px;}
    }
  </style>
</head>

<body>
  <header>
    <div class="top">
      <div class="logo">M</div>
      <div class="logo" style="background:#8f8f8f">M</div>
      <div class="logo" style="background:#d7a0a0">M</div>
    </div>
    <nav>
      <a href="#">WEDDING! 婚禮</a>
      <a href="#">BABY! 雙貓家庭</a>
      <a href="#">PRETTY! 美妝保養</a>
      <a href="#">LIFE! 生活</a>
      <a href="#">EAT! 美食</a>
      <a class="active" href="#">ENJOY! 旅遊餐廳</a>
      <a href="#">蛇年準媽媽</a>
    </nav>
  </header>

  <main class="wrap">
    <section class="hero">
      <!-- 左右兩張圖 -->
      <img src="https://images.unsplash.com/photo-1526481280695-3c687fd5432c?auto=format&fit=crop&w=1400&q=80" alt="">
      <img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?auto=format&fit=crop&w=1400&q=80" alt="">

      <!-- 疊字 -->
      <div class="overlay">
        <h1>
          <span class="vertical">雲林一日遊</span>
          水里蛇窯陶藝文化園區
        </h1>
      </div>
    </section>

    <h2 class="post-title">
      南投水里景點｜水里蛇窯陶藝文化園區｜就是日本小京都，還有超美陶器可以買
    </h2>
  </main>
</body>
</html>
